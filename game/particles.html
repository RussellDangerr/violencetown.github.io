<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Sim — Russell Dangerr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #08060f;
            overflow: hidden;
            font-family: 'Fira Code', 'Courier New', monospace;
        }

        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #7c3aed 0%, #39ff14 100%);
            box-shadow: 0 0 12px rgba(57, 255, 20, 0.5);
            z-index: 10;
        }

        canvas { display: block; cursor: crosshair; }

        #back {
            position: fixed;
            top: 1.2rem; left: 1.2rem;
            color: #2e1c5a;
            font-size: 11px;
            text-decoration: none;
            z-index: 10;
            transition: color 200ms ease, text-shadow 200ms ease;
            letter-spacing: 0.03em;
        }
        #back:hover {
            color: #39ff14;
            text-shadow: 0 0 8px rgba(57, 255, 20, 0.6);
        }

        #hud {
            position: fixed;
            top: 1.2rem; right: 1.2rem;
            color: #2e1c5a;
            font-size: 11px;
            text-align: right;
            pointer-events: none;
            z-index: 10;
            line-height: 1.8;
        }

        #hud .active { color: #39ff14; }

        #controls {
            position: fixed;
            bottom: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            color: #2e1c5a;
            font-size: 11px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>
    <div class="top-bar"></div>
    <canvas id="c"></canvas>
    <a href="/" id="back">← home</a>
    <div id="hud">
        <div id="hud-count">0 particles</div>
        <div id="hud-grav">gravity: ↓</div>
        <div id="hud-field">field: attract</div>
        <div id="hud-vortex">vortex: off</div>
        <div id="hud-net">network: off</div>
    </div>
    <div id="controls">
        click: spawn &nbsp;·&nbsp; hold: stream &nbsp;·&nbsp; right-click: field &nbsp;·&nbsp;
        [g] gravity &nbsp;·&nbsp; [v] vortex &nbsp;·&nbsp; [n] network &nbsp;·&nbsp;
        [e] explode &nbsp;·&nbsp; [r] reset
    </div>

    <script>
    (() => {
        const canvas = document.getElementById('c');
        const ctx    = canvas.getContext('2d');

        const CW = 10;  // char cell width px
        const CH = 16;  // char cell height px

        let W, H, cols, rows;

        // Gravity modes — last one is chaos (rotating)
        const GRAV_MODES = [
            { label: '↓',   gx:  0,     gy:  0.22  },
            { label: '↑',   gx:  0,     gy: -0.22  },
            { label: 'off', gx:  0,     gy:  0     },
            { label: '→',   gx:  0.22,  gy:  0     },
            { label: '←',   gx: -0.22,  gy:  0     },
            { label: '∞',   chaos: true             },
        ];
        let gravIndex = 0;

        // Field modes: attract → repel → off
        const FIELD_MODES = ['attract', 'repel', 'off'];
        let fieldIndex = 0;

        let vortexOn  = false;
        let networkOn = false;

        const mouse = { x: W / 2, y: H / 2, left: false, right: false };
        let mouseDX = 0, mouseDY = 0; // velocity for stream inheritance

        const CHARS = ['.', ',', ':', ';', '+', '*', '#', '@'];

        let particles = [];
        let frame = 0;

        // --- Gravity helper ---
        function gravVec() {
            const gm = GRAV_MODES[gravIndex];
            if (gm.chaos) {
                const a = frame * 0.007;
                return [Math.cos(a) * 0.22, Math.sin(a) * 0.22];
            }
            return [gm.gx, gm.gy];
        }

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cols = Math.floor(W / CW);
            rows = Math.floor(H / CH);
        }

        // --- Particle ---
        class Particle {
            constructor(x, y, vx, vy, life) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.age = 0;
                this.maxAge = life ?? (220 + Math.random() * 280);
            }

            update() {
                const [gx, gy] = gravVec();
                this.vx += gx;
                this.vy += gy;

                this.vx *= 0.997;
                this.vy *= 0.997;

                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0) { this.x = 0; this.vx =  Math.abs(this.vx) * 0.6; }
                if (this.x > W) { this.x = W; this.vx = -Math.abs(this.vx) * 0.6; }
                if (this.y < 0) { this.y = 0; this.vy =  Math.abs(this.vy) * 0.6; }
                if (this.y > H) {
                    this.y = H;
                    this.vy = -Math.abs(this.vy) * 0.5;
                    this.vx *= 0.91;
                }

                this.age++;
                return this.age < this.maxAge;
            }

            speed() { return Math.hypot(this.vx, this.vy); }

            char() {
                return CHARS[Math.min(Math.floor(this.speed() / 1.6), CHARS.length - 1)];
            }

            color() {
                const s     = this.speed();
                const t     = Math.min(s / 14, 1);
                const life  = 1 - this.age / this.maxAge;
                // Gentle pulse: brightness oscillates slightly over lifetime
                const pulse = 1 + 0.12 * Math.sin(this.age * 0.18);
                const alpha = Math.min(1, life * 5) * pulse;

                let r, g, b;
                if (t < 0.4) {
                    const u = t / 0.4;
                    r = Math.floor(28  + u * (124 - 28));
                    g = Math.floor(20  + u * (58  - 20));
                    b = Math.floor(56  + u * (237 - 56));
                } else if (t < 0.75) {
                    const u = (t - 0.4) / 0.35;
                    r = Math.floor(124 + u * (57  - 124));
                    g = Math.floor(58  + u * (255 - 58));
                    b = Math.floor(237 + u * (20  - 237));
                } else {
                    const u = (t - 0.75) / 0.25;
                    r = Math.floor(57  + u * (208 - 57));
                    g = 255;
                    b = Math.floor(20  + u * (204 - 20));
                }

                return `rgba(${r},${g},${b},${Math.min(alpha, 1)})`;
            }
        }

        // --- Spawn helpers ---
        function spawnBurst(x, y, count = 28, speedScale = 1) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = (2 + Math.random() * 9) * speedScale;
                particles.push(new Particle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed));
            }
        }

        function spawnStream(x, y) {
            // Base upward fan + inherit mouse drag velocity
            const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.9;
            const speed = 2 + Math.random() * 5;
            particles.push(new Particle(
                x, y,
                Math.cos(angle) * speed + mouseDX * 0.35,
                Math.sin(angle) * speed + mouseDY * 0.35,
                280 + Math.random() * 200
            ));
        }

        function spawnRain() {
            particles.push(new Particle(
                Math.random() * W, -CH,
                (Math.random() - 0.5) * 0.4,
                1 + Math.random() * 2,
                450
            ));
        }

        // --- Network lines ---
        function drawNetwork() {
            const maxDist = 90;
            const maxLines = 180;
            let drawn = 0;

            ctx.beginPath();
            for (let i = 0; i < particles.length && drawn < maxLines; i++) {
                const a = particles[i];
                for (let j = i + 1; j < particles.length && drawn < maxLines; j++) {
                    const b = particles[j];
                    const dx = a.x - b.x;
                    if (Math.abs(dx) > maxDist) continue;
                    const dy = a.y - b.y;
                    if (Math.abs(dy) > maxDist) continue;
                    if (Math.hypot(dx, dy) < maxDist) {
                        ctx.moveTo(a.x, a.y);
                        ctx.lineTo(b.x, b.y);
                        drawn++;
                    }
                }
            }

            ctx.strokeStyle = 'rgba(124, 58, 237, 0.18)';
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }

        // --- Main loop ---
        function loop() {
            ctx.fillStyle = 'rgba(8, 6, 15, 0.2)';
            ctx.fillRect(0, 0, W, H);

            // Network lines drawn beneath particles
            if (networkOn && particles.length > 1) drawNetwork();

            ctx.font = `${CH - 2}px "Fira Code", "Courier New", monospace`;
            ctx.textBaseline = 'top';

            // Field force (attract / repel)
            if (mouse.right && FIELD_MODES[fieldIndex] !== 'off') {
                const dir = FIELD_MODES[fieldIndex] === 'repel' ? -1 : 1;
                for (const p of particles) {
                    const dx   = mouse.x - p.x;
                    const dy   = mouse.y - p.y;
                    const dist = Math.hypot(dx, dy) + 1;
                    const f    = Math.min(18000 / (dist * dist), 4) * dir;
                    p.vx += (dx / dist) * f;
                    p.vy += (dy / dist) * f;
                }
            }

            // Vortex: tangential force around cursor
            if (vortexOn) {
                for (const p of particles) {
                    const dx   = mouse.x - p.x;
                    const dy   = mouse.y - p.y;
                    const dist = Math.hypot(dx, dy) + 1;
                    // Tangent vector (perpendicular to radius)
                    const tx = -dy / dist;
                    const ty =  dx / dist;
                    const f  = Math.min(6000 / (dist * dist + 400), 2.5);
                    p.vx += tx * f;
                    p.vy += ty * f;
                    // Slight inward pull to sustain orbits
                    p.vx += (dx / dist) * f * 0.25;
                    p.vy += (dy / dist) * f * 0.25;
                }
            }

            // Continuous stream on left hold
            if (mouse.left && frame % 2 === 0) {
                for (let i = 0; i < 3; i++) spawnStream(mouse.x, mouse.y);
            }

            // Ambient rain when sparse
            if (frame % 5 === 0 && particles.length < 600) spawnRain();

            // Update & render particles
            particles = particles.filter(p => {
                const alive = p.update();
                if (alive) {
                    const col = Math.floor(p.x / CW);
                    const row = Math.floor(p.y / CH);
                    if (col >= 0 && col < cols && row >= 0 && row < rows) {
                        ctx.fillStyle = p.color();
                        ctx.fillText(p.char(), col * CW, row * CH);
                    }
                }
                return alive;
            });

            if (particles.length > 2500) particles.splice(0, particles.length - 2500);

            // HUD
            document.getElementById('hud-count').textContent = `${particles.length} particles`;

            frame++;
            requestAnimationFrame(loop);
        }

        // --- HUD helpers ---
        function setHudActive(id, on) {
            document.getElementById(id).className = on ? 'active' : '';
        }

        // --- Input ---
        canvas.addEventListener('mousedown', e => {
            if (e.button === 0) { mouse.left = true; spawnBurst(e.clientX, e.clientY); }
            if (e.button === 2) mouse.right = true;
        });

        canvas.addEventListener('mouseup', e => {
            if (e.button === 0) mouse.left  = false;
            if (e.button === 2) mouse.right = false;
        });

        canvas.addEventListener('mousemove', e => {
            mouseDX = (e.clientX - mouse.x) * 0.5;
            mouseDY = (e.clientY - mouse.y) * 0.5;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('contextmenu', e => {
            e.preventDefault();
            // Cycle field mode on right-click (mousedown already sets mouse.right)
            fieldIndex = (fieldIndex + 1) % FIELD_MODES.length;
            const mode = FIELD_MODES[fieldIndex];
            const el = document.getElementById('hud-field');
            el.textContent = `field: ${mode}`;
            el.className = mode !== 'off' ? 'active' : '';
        });

        // Touch support
        function touchPos(e) {
            const t = e.touches[0] || e.changedTouches[0];
            return { x: t.clientX, y: t.clientY };
        }

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const pos = touchPos(e);
            mouseDX = 0; mouseDY = 0;
            mouse.x = pos.x; mouse.y = pos.y;
            mouse.left = true;
            spawnBurst(pos.x, pos.y);
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const pos = touchPos(e);
            mouseDX = (pos.x - mouse.x) * 0.5;
            mouseDY = (pos.y - mouse.y) * 0.5;
            mouse.x = pos.x; mouse.y = pos.y;
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            mouse.left = false;
        }, { passive: false });

        document.addEventListener('keydown', e => {
            switch (e.key.toLowerCase()) {
                case 'g':
                    gravIndex = (gravIndex + 1) % GRAV_MODES.length;
                    const gm = GRAV_MODES[gravIndex];
                    const el = document.getElementById('hud-grav');
                    el.textContent = `gravity: ${gm.label}`;
                    el.className   = gm.chaos ? 'active' : '';
                    break;
                case 'v':
                    vortexOn = !vortexOn;
                    setHudActive('hud-vortex', vortexOn);
                    document.getElementById('hud-vortex').textContent = `vortex: ${vortexOn ? 'on' : 'off'}`;
                    break;
                case 'n':
                    networkOn = !networkOn;
                    setHudActive('hud-net', networkOn);
                    document.getElementById('hud-net').textContent = `network: ${networkOn ? 'on' : 'off'}`;
                    break;
                case 'r':
                    particles = [];
                    ctx.fillStyle = '#08060f';
                    ctx.fillRect(0, 0, W, H);
                    break;
                case 'e':
                    spawnBurst(mouse.x, mouse.y, 90, 2);
                    break;
            }
        });

        window.addEventListener('resize', resize);

        // Init
        resize();
        mouse.x = W / 2;
        mouse.y = H / 2;
        ctx.fillStyle = '#08060f';
        ctx.fillRect(0, 0, W, H);
        loop();
    })();
    </script>
</body>
</html>
