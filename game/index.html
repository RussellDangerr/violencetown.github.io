<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="version" content="0.4.0">
    <title>Violencetown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Splash — rendered on its own canvas for pixel art consistency -->
    <div id="splash">
        <canvas id="splash-canvas"></canvas>
        <div id="splash-buttons">
            <button id="splash-go">NEW GAME</button>
            <button id="splash-continue" class="hidden">CONTINUE</button>
        </div>
        <div id="splash-hint">press Space</div>
    </div>

    <div id="game-wrapper" class="hidden">
        <div id="game-layout">
            <canvas id="game-canvas"></canvas>
            <div id="log-panel">
                <div id="text-log"></div>
            </div>
        </div>
        <button id="new-game">NEW</button>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
