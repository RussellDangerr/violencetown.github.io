<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Food Deals — Russell Dangerr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="deals.css">
</head>
<body>
    <div class="top-bar"></div>
    <div class="container">

        <header>
            <a href="/" class="back-link">← russelldangerr.com</a>
            <span class="page-title">Fast Food Deals</span>
        </header>

        <div class="controls">
            <input
                type="search"
                id="search-input"
                class="search-input"
                placeholder="Search deals…"
                aria-label="Search deals"
            >
            <select id="restaurant-filter" class="filter-select" aria-label="Filter by restaurant">
                <option value="">All restaurants</option>
            </select>
            <span id="result-count" class="result-count"></span>
        </div>

        <p id="last-updated" class="last-updated" hidden>
            Last updated: <span></span>
        </p>

        <main>
            <div id="deal-grid" class="deal-grid"></div>
            <div id="empty-state" class="empty-state" hidden>
                <p>No deals found.</p>
                <p>Try adjusting your search or run the crawler to refresh the data.</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Russell Dangerr. Deal data scraped from public restaurant pages.</p>
        </footer>

    </div>
    <script src="deals.js"></script>
</body>
</html>
